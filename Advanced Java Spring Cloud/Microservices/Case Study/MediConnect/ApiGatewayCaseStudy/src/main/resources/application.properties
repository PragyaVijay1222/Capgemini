spring.application.name=ApiGatewayCaseStudy

server.port=8080

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=appointmentServiceCaseStudy
spring.cloud.gateway.routes[0].uri=lb://APPOINTMENTSERVICECASESTUDY
spring.cloud.gateway.routes[0].predicates=Path=/appointments/**

spring.cloud.gateway.routes[1].id=doctorServiceCaseStudy
spring.cloud.gateway.routes[1].uri=lb://DOCTORSERVICECASESTUDY
spring.cloud.gateway.routes[1].predicates=Path=/doctors/**