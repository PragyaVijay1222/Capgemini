spring.application.name=AppointmentServiceCaseStudy

server.port=8082

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.doctorServiceCaseStudy.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.doctorServiceCaseStudy.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.doctorServiceCaseStudy.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.doctorServiceCaseStudy.permitted-number-of-calls-in-half-open-state=3

management.endpoints.web.exposure.include=*

management.health.circuitbreakers.enabled=true

